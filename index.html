<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台湾修学旅行パチモン図鑑</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #1a1a1a; color: #fff; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        
        /* カードスタイル */
        .card { background: #2a2a2a; border: 2px solid #444; border-radius: 12px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); position: relative; transition: all 0.3s; }
        .card.unlocked { border-color: #00ffcc; }
        .card.shiny-mode { border-color: #ff00ff; background: linear-gradient(145deg, #2a2a2a, #3a1a3a); box-shadow: 0 4px 15px rgba(255,0,255,0.4); }
        
        .badge { position: absolute; top: 10px; right: 10px; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .badge.normal { background: #555; }
        .badge.hidden { background: #ff3366; }
        
        .location { color: #ffd700; font-size: 13px; margin-bottom: 5px; font-weight: bold; }
        .monster-name { font-size: 20px; font-weight: bold; color: #fff; margin: 5px 0; }
        .unlocked .monster-name { color: #ffd700; }
        
        .monster-img { width: 100px; height: 100px; background: #3a3a3a; display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 10px auto; border-radius: 50%; transition: transform 0.3s; }
        .shiny-sparkle { color: #ff00ff; animation: blink 1s infinite alternate; font-size: 12px; font-weight: bold; display: none; }
        .desc { font-size: 14px; color: #ddd; background: #1f1f1f; padding: 10px; border-radius: 6px; min-height: 40px; }
        
        /* ボタン */
        .btn-group { display: flex; gap: 5px; margin-top: 10px; }
        button { flex: 1; padding: 10px; border: none; border-radius: 6px; background: #00ffcc; color: #000; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #00ccaa; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        button.btn-shiny-toggle { background: #ff00ff; color: #fff; display: none; }
        button.btn-search { background: #ff9900; color: #fff; }
        button.btn-search:hover { background: #e08800; }
        
        .locked-text { color: #666; font-style: italic; text-align: center; padding: 20px 0; font-size: 15px; }

        /* ✨ エンカウント演出用オーバーレイモーダル ✨ */
        .battle-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; text-align: center; }
        .battle-dialog { background: linear-gradient(135deg, #222, #111); border: 3px solid #ffd700; border-radius: 15px; padding: 30px; max-width: 400px; width: 85%; box-shadow: 0 0 20px rgba(255,215,0,0.4); }
        .battle-dialog.shake { animation: screen-shake 0.5s ease-in-out; }
        .battle-title { font-size: 16px; color: #ff3366; font-weight: bold; letter-spacing: 2px; margin-bottom: 15px; }
        .battle-flash { font-size: 24px; font-weight: bold; margin: 20px 0; color: #fff; }
        
        /* アニメーション */
        @keyframes blink { from { opacity: 0.4; } to { opacity: 1; } }
        @keyframes screen-shake {
            0%, 100% { transform: translateX(0) translateY(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-8px) translateY(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(8px) translateY(5px); }
        }
    </style>
</head>
<body>

    <h1>🇨🇳 台湾修学旅行パチモン図鑑 🇹🇼</h1>
    <div class="grid" id="zukan-grid"></div>

    <!-- 💥 エンカウント演出画面 💥 -->
    <div id="battle-modal" class="battle-overlay">
        <div id="battle-box" class="battle-dialog">
            <div class="battle-title" id="battle-event-type">⚠️ ENCOUNTER ⚠️</div>
            <div style="font-size: 50px; margin: 10px 0;" id="battle-emoji">❓</div>
            <div class="battle-flash" id="battle-text">草むらを調査中...</div>
            <button id="catch-confirm-btn" style="font-size: 16px; padding: 12px; background: #00ffcc;" onclick="closeBattleModal()">図鑑に登録する！</button>
        </div>
    </div>

    <script>
        // モンスターマスターデータ
        const monsterData = [
            { id: 1, type: 'normal', location: 'ホテル', name: '小籠包くん', desc: '一見なんの変哲もない小籠包。彼の中には熱き魂が、、、', emoji: '🥟', canShiny: false },
            { id: 2, type: 'normal', location: '桃園空港', name: '隊ワン', desc: '隊列になった犬たち。かわいい。', emoji: '🐕', canShiny: true },
            { id: 3, type: 'normal', location: '淡水', name: '鯛わん', desc: '淡水にいるけど海水魚。', emoji: '🐟', canShiny: true },
            { id: 4, type: 'normal', location: '九份', name: '湯爺爺', desc: '千と千尋の神隠しが好きなお爺さん。', emoji: '👴', canShiny: true },
            { id: 5, type: 'normal', location: '龍山寺', name: 'カス寺', desc: '逆張りだけが生きがいの不良。逆張りはただの自己満である。', emoji: '📿', canShiny: true },
            { id: 6, type: 'normal', location: '台北駅', name: 'タピ岡先生', desc: '歴史ヲタク。', emoji: '🧋', canShiny: true },
            { id: 7, type: 'normal', location: '台北101', name: '台北110', desc: '街の安全を守る存在。税金はきちんと払っている。', emoji: '🏢', canShiny: true },
            { id: 8, type: 'normal', location: '猫空', name: 'にゃんくう', desc: '隊ワンに対抗意識を燃やしているネコ。愛くるしさも全て計算である。', emoji: '🐱', canShiny: true },
            { id: 9, type: 'normal', location: '故宮博物院', name: '白菜さん', desc: '歯磨きを知らない。風呂はキャンセルしてないらしい。', emoji: '🥬', canShiny: true },
            { id: 10, type: 'normal', location: '中正紀念堂', name: '紹介石', desc: 'パワーストーンが好きな怪しいおじさん。', emoji: '🔮', canShiny: true },
            { id: 11, type: 'normal', location: '台北市立動物園', name: 'パンパンパンダ', desc: '笹の食べ過ぎで太ったパンダ。でも、逆に人気らしい。人間もそうありたいものだ。', emoji: '🐼', canShiny: true },
            { id: 12, type: 'normal', location: '十分', name: '天燈蟲', desc: '願いを叶える力はない。ただ飛ぶだけである。蛍と間違えられると怒る。', emoji: '🏮', canShiny: true },
            { id: 13, type: 'normal', location: '西門町', name: 'サイモン', desc: '某審査員と似て、イギリスで音楽を勉強しているパチモン。', emoji: '🎙️', canShiny: true },
            { id: 14, type: 'normal', location: '永康街', name: 'マンゴリラ', desc: '可食部はゴリラの部分だけらしい。一体上の部分はなんだというのか。', emoji: '🦍', canShiny: true },
            { id: 15, type: 'normal', location: '士林夜市', name: 'ルーローはん', desc: '知らんけど、そう言い残して彼は大阪へ帰った。', emoji: '🍚', canShiny: true },
            
            { id: 16, type: 'hidden', location: '三国丘高校', name: 'ミクニン', desc: '僕らと一緒には来てくれないらしい。', emoji: '🏫', canShiny: true },
            { id: 17, type: 'hidden', location: '関西国際空港', name: 'ジャポン', desc: '飛行機が怖くて世界を知らない蛙。船もあるのに。まさに井の中の蛙である。', emoji: '🐸', canShiny: true },
            { id: 18, type: 'hidden', location: '画面連打', name: 'レンダキング', desc: '隠しキャラの定番。高橋名人は今見てもすごいよね。', emoji: '👑', canShiny: true },
            { id: 19, type: 'hidden', location: '放置', name: 'ホウチドラゴン', desc: 'よくぞここまで。', emoji: '🐉', canShiny: true },
            { id: 20, type: 'hidden', location: '小籠包くん譲渡進化', name: '超籠包', desc: '小籠包の中身が譲渡で成長。中身を見たものは次の日にはいなくなっている。', emoji: '🔱', canShiny: true }
        ];

        // 状態管理
        const playerState = {};
        monsterData.forEach(m => {
            playerState[m.id] = { unlocked: false, hasShiny: false, viewMode: 'normal' };
        });
        let hasReceivedTransfer = false;

        const grid = document.getElementById('zukan-grid');

        function renderZukan() {
            grid.innerHTML = '';
            
            monsterData.forEach(m => {
                const state = playerState[m.id];
                const card = document.createElement('div');
                card.className = `card ${state.unlocked ? 'unlocked' : ''} ${state.viewMode === 'shiny' ? 'shiny-mode' : ''}`;
                
                // 隠しモンスター（未入手）の完全隠蔽
                if (m.type === 'hidden' && !state.unlocked) {
                    let actionLabel = "条件クリア";
                    if (m.id === 18) actionLabel = "⚡ 画面を猛連打する！";
                    if (m.id === 19) actionLabel = "⏳ スマホをしばらく放置する";
                    if (m.id === 16 || m.id === 17) actionLabel = `📍 ${m.location}にチェックイン`;

                    card.innerHTML = `
                        <div class="badge hidden">SECRET</div>
                        <div class="locked-text">❓ ？？？？？？？？？？</div>
                        <button onclick="startEncounter(${m.id})">${actionLabel}</button>
                    `;
                    grid.appendChild(card);
                    return;
                }

                const badgeText = m.type === 'normal' ? '通常' : '隠し';
                const badgeClass = m.type === 'normal' ? 'normal' : 'hidden';
                
                let html = `<div class="badge ${badgeClass}">${badgeText}</div>`;
                html += `<div class="location">📍 出現マップ: ${m.location}</div>`;

                if (state.unlocked) {
                    // 解放済み
                    const currentEmoji = state.viewMode === 'shiny' ? '✨' + m.emoji + '✨' : m.emoji;
                    const displayName = state.viewMode === 'shiny' ? m.name + ' (色違い)' : m.name;
                    
                    html += `
                        <div class="monster-name">${displayName} <span class="shiny-sparkle" id="sparkle-${m.id}">★SHINY★</span></div>
                        <div class="monster-img">${currentEmoji}</div>
                        <div class="desc">${m.desc}</div>
                    `;

                    if (m.id === 1) {
                        html += `
                            <div class="btn-group">
                                <button id="transfer-btn" onclick="receiveTransfer()" ${hasReceivedTransfer ? 'disabled' : ''}>
                                    ${hasReceivedTransfer ? '譲渡受付済み' : '🤝 友達から譲渡を受ける'}
                                </button>
                            </div>
                        `;
                    } else {
                        html += `
                            <div class="btn-group">
                                <button class="btn-shiny-toggle" id="shiny-btn-${m.id}" onclick="toggleShiny(${m.id})">✨ 通常/色違い 切替</button>
                            </div>
                        `;
                    }
                } else {
                    // 未解放（通常モンスター：場所だけ表示）
                    html += `
                        <div class="monster-name">？？？？？</div>
                        <div class="monster-img">🔒</div>
                        <div class="desc" style="color:#555; text-align:center;">未入手のためデータなし</div>
                        <div class="btn-group">
                            <button class="btn-search" onclick="startEncounter(${m.id})">🔍 周囲を探索する！</button>
                        </div>
                    `;
                }

                card.innerHTML = html;
                grid.appendChild(card);

                if (state.unlocked) {
                    if (state.hasShiny && document.getElementById(`shiny-btn-${m.id}`)) {
                        document.getElementById(`shiny-btn-${m.id}`).style.display = 'block';
                    }
                    if (state.viewMode === 'shiny' && document.getElementById(`sparkle-${m.id}`)) {
                        document.getElementById(`sparkle-${m.id}`).style.display = 'inline';
                    }
                }
            });
        }

        // 💥 エンカウント演出開始 💥
        function startEncounter(id) {
            const m = monsterData.find(x => x.id === id);
            const modal = document.getElementById('battle-modal');
            const box = document.getElementById('battle-box');
            const eventType = document.getElementById('battle-event-type');
            const emojiText = document.getElementById('battle-emoji');
            const battleText = document.getElementById('battle-text');
            
            // モーダル初期化＆表示
            modal.style.display = 'flex';
            box.classList.add('shake');
            
            if (m.type === 'normal') {
                eventType.innerText = `⚠️ WILD ENCOUNTER IN ${m.location.toUpperCase()} ⚠️`;
                emojiText.innerText = "🔍";
                battleText.innerText = `${m.location}の周辺を探しています...`;
            } else {
                eventType.innerText = "✨ SECRET EVENT TRIGGERED ✨";
                emojiText.innerText = "⚡";
                if (id === 18) battleText.innerText = "画面を30回猛連打した！";
                if (id === 19) battleText.innerText = "スマホを10秒間放置した...";
                if (id === 16 || id === 17) battleText.innerText = `${m.location}へのチェックインを確認！`;
            }

            // 1.2秒後にパチモン出現演出
            setTimeout(() => {
                box.classList.remove('shake');
                
                // 色違いの先行抽選
                let isShiny = false;
                if (m.canShiny && !playerState[id].hasShiny && Math.random() < 0.10) {
                    isShiny = true;
                }

                // 捕獲確定処理へデータを渡すためボタンを仕込む
                document.getElementById('catch-confirm-btn').onclick = function() {
                    executeCatch(id, isShiny);
                };

                if (isShiny) {
                    eventType.innerText = "✨✨ SHINY ENCOUNTER!!!! ✨✨";
                    emojiText.innerText = "✨" + m.emoji + "✨";
                    battleText.innerHTML = `<span style="color:#ff00ff; font-size:28px;">あ、ありえないッ！！！</span><br>色違いの野生の「${m.name}」が飛び出してきた！`;
                } else {
                    eventType.innerText = "🎉 パチモンを発見！ 🎉";
                    emojiText.innerText = m.emoji;
                    battleText.innerText = `野生の「${m.name}」が飛び出してきた！`;
                }
            }, 1200);
        }

        // 捕獲完了・図鑑登録
        function executeCatch(id, isShiny) {
            const state = playerState[id];
            state.unlocked = true;

            if (isShiny) {
                state.hasShiny = true;
                state.viewMode = 'shiny';
            }

            document.getElementById('battle-modal').style.display = 'none';
            renderZukan();
        }

        // 小籠包くんの譲渡進化（ここも専用の熱い演出つき）
        function receiveTransfer() {
            if (hasReceivedTransfer) return;
            if (!playerState[1].unlocked) {
                alert('まだ自分の「小籠包くん」を捕まえていません！ホテルで探してから譲渡を受けましょう！');
                return;
            }

            hasReceivedTransfer = true;
            
            // 演出モーダルを起動
            const modal = document.getElementById('battle-modal');
            const eventType = document.getElementById('battle-event-type');
            const emojiText = document.getElementById('battle-emoji');
            const battleText = document.getElementById('battle-text');
            
            modal.style.display = 'flex';
            eventType.innerText = "🤝 NETWORK TRANSFER 🤝";
            emojiText.innerText = "📲";
            battleText.innerText = "通信中... 友達から小籠包くんが送られてきます...";

            setTimeout(() => {
                playerState[20].unlocked = true; // 超籠包解放
                
                eventType.innerText = "🔴 警告：禁忌の進化 🔴";
                emojiText.innerText = "🔱";
                battleText.innerHTML = `譲渡された瞬間、手元の小籠包くんの中身が共鳴し急成長！<br><br><span style="color:#ff3366; font-size:24px; font-weight:bold;">「超籠包」に進化してしまった！</span>`;
                
                document.getElementById('catch-confirm-btn').onclick = function() {
                    document.getElementById('battle-modal').style.display = 'none';
                    renderZukan();
                };
            }, 1500);
        }

        // 色違いスキンの切り替え
        function toggleShiny(id) {
            const state = playerState[id];
            state.viewMode = state.viewMode === 'normal' ? 'shiny' : 'normal';
            renderZukan();
        }

        // 初期起動
        renderZukan();
    </script>
</body>
</html>
