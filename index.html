<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パチモンGO - 台湾修学旅行</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ── 【あなたのFirebase設定を合体！】 ──
        const firebaseConfig = {
            apiKey: "AIzaSyAao7sTYNZW-Fohull07j6JNz3KZ_TVsLA",
            authDomain: "pachimon-go.firebaseapp.com",
            projectId: "pachimon-go",
            storageBucket: "pachimon-go.firebasestorage.app",
            messagingSenderId: "35732911731",
            appId: "1:35732911731:web:a474c014de3d80161e5c06",
            measurementId: "G-MH27Y692XD"
        };

        // Firebaseの初期化
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // スポットデータ（全15箇所）
        const spots = [
            { id: 1, name: "台北101 (日本テスト用)", lat: 34.49634, lng: 135.51357, monster: "タピオカ龍" },
            { id: 2, name: "故宮博物院", lat: 25.1023, lng: 121.5484, monster: "ハクサイ獣" },
            { id: 3, name: "九份（ジョウフェン）", lat: 25.1099, lng: 121.8452, monster: "カオナシ鳥" },
            { id: 4, name: "士林夜市", lat: 25.0879, lng: 121.5241, monster: "ダージーパイ魔" },
            { id: 5, name: "龍山寺", lat: 25.0369, lng: 121.5003, monster: "パワスポ狐" },
            { id: 6, name: "中正紀念堂", lat: 25.0357, lng: 121.5218, monster: "ヘイタイ兵" },
            { id: 7, name: "西門町", lat: 25.0441, lng: 121.5065, monster: "若者カエル" },
            { id: 8, name: "高雄・蓮池潭", lat: 22.6845, lng: 120.2926, monster: "リュウトラ猫" },
            { id: 9, name: "日月潭", lat: 23.8582, lng: 120.9126, monster: "ミズウミ魚" },
            { id: 10, name: "太魯閣渓谷", lat: 24.1593, lng: 121.6214, monster: "イワノ岩男" },
            { id: 11, name: "平渓（ランタン）", lat: 25.0256, lng: 121.7401, monster: "ランタン精" },
            { id: 12, name: "野柳地質公園", lat: 25.2064, lng: 121.6905, monster: "クイーン女王" },
            { id: 13, name: "淡水（ダンシュイ）", lat: 25.1706, lng: 121.4409, monster: "ユウヤケ鳥" },
            { id: 14, name: "阿里山", lat: 23.5111, lng: 120.8031, monster: "タイザン木の精" },
            { id: 15, name: "台南・赤嵌楼", lat: 22.9976, lng: 120.2026, monster: "レキシ古亀" }
        ];

        let myUsername = "";
        let myTeam = "";
        let userData = { score: 0, caught: {}, playedSpots: {} };
        let currentActiveSpot = null;
        let currentIsRare = false;

        // 距離計算
        function getDistance(lat1, lng1, lat2, lng2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLng / 2) * Math.sin(dLng / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        // チーム選択
        window.selectTeam = function(teamName) {
            myTeam = teamName;
            document.getElementById("btn-teamA").classList.remove("selected");
            document.getElementById("btn-teamB").classList.remove("selected");
            document.getElementById("btn-teamC").classList.remove("selected");
            document.getElementById("btn-team" + teamName).classList.add("selected");
        }

        // ゲーム開始＆ログイン（ここでデータベースから自分のデータを取得・作成）
        window.startGame = async function() {
            myUsername = document.getElementById("username-input").value.trim();
            if (!myUsername) { alert("名前を入力してね！"); return; }
            if (!myTeam) { alert("チームを選んでね！"); return; }

            const userRef = doc(db, "users", myUsername);
            const userSnap = await getDoc(userRef);

            if (userSnap.exists()) {
                // 既存ユーザーならデータを読み込む
                userData = userSnap.data();
                myTeam = userData.team || myTeam; // チームを上書き
            } else {
                // 新規ユーザーならデータ作成
                userData = { username: myUsername, team: myTeam, score: 0, caught: {}, playedSpots: {} };
                await setDoc(userRef, userData);
            }

            document.getElementById("player-name").innerText = myUsername;
            document.getElementById("player-team").innerText = myTeam;
            document.getElementById("my-score").innerText = userData.score;

            document.getElementById("login-area").style.display = "none";
            document.getElementById("game-area").style.display = "block";
            
            updateSpotListUI();
            startRankingListener(); // ランキングのリアルタイム同期スタート
        }

        // GPS周辺スキャン
        window.checkLocation = function() {
            const statusDiv = document.getElementById("status");
            statusDiv.innerText = "GPSスキャン中...";
            document.getElementById("event-area").style.display = "none";
            currentActiveSpot = null;

            navigator.geolocation.getCurrentPosition((position) => {
                const uLat = position.coords.latitude;
                const uLng = position.coords.longitude;
                let found = false;

                for (let spot of spots) {
                    const dist = getDistance(uLat, uLng, spot.lat, spot.lng);
                    if (dist <= 50) {
                        found = true;
                        if (userData.playedSpots[spot.id]) {
                            statusDiv.innerHTML = `<span style="color:orange;">${spot.name}にいますが、この場所は終了しています。</span>`;
                            break;
                        }
                        currentActiveSpot = spot;
                        statusDiv.innerHTML = `<span style="color:green;">🎯 ${spot.name}（残り ${Math.round(dist)}m）に到着！</span>`;
                        triggerCatchEvent(spot);
                        break;
                    }
                }
                if (!found) {
                    statusDiv.innerHTML = `<span style="color:red;">近くに観光地スポットがありません。</span>`;
                }
            }, () => { statusDiv.innerText = "GPSエラー。"; }, { enableHighAccuracy: true });
        }

        function triggerCatchEvent(spot) {
            currentIsRare = Math.random() <= 0.10; // 10%でレア
            const monsterSprite = document.getElementById("monster-sprite");
            const monsterInfo = document.getElementById("monster-info");
            
            if (currentIsRare) {
                monsterSprite.innerText = "✨👑✨";
                monsterInfo.innerHTML = `<span style="color:#FF9800;">【レア出現！】金ピカの ${spot.monster} (3倍!)</span>`;
            } else {
                monsterSprite.innerText = "👾";
                monsterInfo.innerText = `野生の ${spot.monster} が現れた！`;
            }
            
            document.getElementById("catch-btn").classList.remove("disabled");
            document.getElementById("catch-btn").innerText = "モンスターボールを投げる！";
            document.getElementById("event-area").style.display = "block";
        }

        // 捕獲処理（結果をFirebaseに即保存）
        window.tryCatch = async function() {
            if (!currentActiveSpot || userData.playedSpots[currentActiveSpot.id]) return;
            
            // 1人1回制限
            userData.playedSpots[currentActiveSpot.id] = true;
            document.getElementById("catch-btn").classList.add("disabled");
            document.getElementById("catch-btn").innerText = "終了";

            const isSuccess = Math.random() <= 0.70; // 70%でゲット

            if (isSuccess) {
                // 図鑑に登録（レアか通常か）
                userData.caught[currentActiveSpot.id] = currentIsRare ? "rare" : "normal";
                // スコア計算
                userData.score += currentIsRare ? 30 : 10;
                alert(currentIsRare ? `🎉レアの「${currentActiveSpot.monster}」を捕まえた！(30P)` : `🎉「${currentActiveSpot.monster}」を捕まえた！(10P)`);
            } else {
                alert(`😭「${currentActiveSpot.monster}」は逃げてしまった...！`);
            }

            // Firebaseのデータを更新
            await setDoc(doc(db, "users", myUsername), userData);

            document.getElementById("my-score").innerText = userData.score;
            document.getElementById("event-area").style.display = "none";
            updateSpotListUI();
        }

        // UI（簡易図鑑）の更新
        function updateSpotListUI() {
            const listDiv = document.getElementById("spot-list-ui");
            listDiv.innerHTML = "";
            spots.forEach(spot => {
                let statusText = "❌未所持";
                const status = userData.caught[spot.id];
                if (status === "normal") statusText = "✅通常 (10P)";
                if (status === "rare") statusText = "✨金ピカ (30P)";
                if (!status && userData.playedSpots[spot.id]) statusText = "💨逃げられた";
                
                listDiv.innerHTML += `<div>・<b>${spot.name}</b>: ${statusText}</div>`;
            });
        }

        // 全員のランキングをリアルタイムで監視・表示する
        function startRankingListener() {
            onSnapshot(collection(db, "users"), (snapshot) => {
                let players = [];
                snapshot.forEach(doc => players.push(doc.data()));

                // スコアが高い順（ランキング）に並び替え
                players.sort((a, b) => b.score - a.score);

                const rankDiv = document.getElementById("ranking-ui");
                rankDiv.innerHTML = "";
                players.forEach((p, index) => {
                    rankDiv.innerHTML += `<div>${index + 1}位: <b>${p.username}</b> (${p.team}チーム) - ${p.score}P</div>`;
                });
            });
        }
    </script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; padding: 15px; background: #eef2f3; color: #333; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin: 15px auto; max-width: 400px; }
        button { padding: 12px 24px; font-size: 16px; font-weight: bold; background: #FF5722; color: white; border: none; border-radius: 25px; cursor: pointer; box-shadow: 0 4px 0 #D84315; margin: 5px; }
        button:active { transform: translateY(4px); box-shadow: none; }
        .disabled { background: #9e9e9e !important; box-shadow: 0 4px 0 #757575 !important; cursor: not-allowed; }
        .monster-box { font-size: 70px; margin: 10px; animation: bounce 0.5s infinite alternate; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }
        .spot-list { text-align: left; font-size: 14px; max-height: 150px; overflow-y: auto; background: #f9f9f9; padding: 10px; border-radius: 8px; }
        .team-btn { background: #007BFF; box-shadow: 0 4px 0 #0056b3; }
        .team-btn.selected { background: #4CAF50 !important; box-shadow: 0 4px 0 #388E3C !important; }
    </style>
</head>
<body>

    <h1>🇹🇼 パチモンGO 🇹🇼</h1>
    
    <div class="card" id="login-area">
        <h3>プレイヤー登録</h3>
        <input type="text" id="username-input" placeholder="名前を入力" style="padding: 12px; font-size: 16px; border-radius: 5px; border: 1px solid #ccc; width: 80%; margin-bottom: 15px;"><br>
        
        <p style="margin: 5px 0; font-weight: bold;">所属チームを選択</p>
        <button type="button" class="team-btn" id="btn-teamA" onclick="selectTeam('A')">A</button>
        <button type="button" class="team-btn" id="btn-teamB" onclick="selectTeam('B')">B</button>
        <button type="button" class="team-btn" id="btn-teamC" onclick="selectTeam('C')">C</button>
        
        <div style="margin-top: 20px;">
            <button onclick="startGame()" style="background: #E91E63; box-shadow: 0 4px 0 #C2185B; width: 60%;">ゲームスタート</button>
        </div>
    </div>

    <div id="game-area" style="display: none;">
        <div class="card">
            <h2>こんにちは、<span id="player-name" style="color:#007BFF;"></span> さん!</h2>
            <p>所属: <span id="player-team" style="font-weight:bold; color:#4CAF50;"></span>チーム</p>
            <p>現在の合計ポイント: <span id="my-score" style="font-weight:bold; color:#FF5722; font-size:20px;">0</span> P</p>
            <button onclick="checkLocation()">現在地をスキャンする</button>
            <div id="status" style="margin-top:10px; font-weight:bold;">近くのスポットに近づいてスキャンしよう！</div>
        </div>

        <div id="event-area" class="card" style="display: none;">
            <h2 style="color: #E91E63;">⚠️ モンスター出現！ ⚠️</h2>
            <div id="monster-sprite" class="monster-box">👾</div>
            <p id="monster-info" style="font-size: 18px; font-weight: bold;"></p>
            <button id="catch-btn" onclick="tryCatch()">モンスターボールを投げる！</button>
        </div>

        <div class="card">
            <h3 style="color: #FF9800;">🏆 リアルタイムランキング 🏆</h3>
            <div class="spot-list" id="ranking-ui" style="max-height: 200px;"></div>
        </div>

        <div class="card">
            <h3>📍 台湾の観光地スポット（全15箇所）</h3>
            <div class="spot-list" id="spot-list-ui"></div>
        </div>
    </div>

</body>
</html>
